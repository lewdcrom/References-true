<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LewdCrom — References Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Josefin+Sans:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C; --gold2: #e8c96a;
    --dark: #0a0a10; --dark2: #0f0f18; --dark3: #161620;
    --border: rgba(201,168,76,0.15); --text: #d4cfc8; --muted: rgba(212,207,200,0.45);
  }
  body {
    background: var(--dark); color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 24px; animation: fadeUp 0.7s ease both; }
  .logo { text-align: center; margin-bottom: 48px; }
  .logo-title { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 600; letter-spacing: 0.3em; color: var(--gold); }
  .logo-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--muted); letter-spacing: 0.15em; margin-top: 6px; }
  .logo-line { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 16px auto 0; }
  .card { background: var(--dark2); border: 1px solid var(--border); padding: 36px 32px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.6; }
  .card-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.2em; color: var(--text); margin-bottom: 8px; }
  .card-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 28px; line-height: 1.6; }
  .tabs { display:flex; gap:0; margin-bottom:24px; border-bottom:1px solid var(--border); }
  .tab { font-family:'Josefin Sans',sans-serif; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; padding:10px 20px; cursor:pointer; color:var(--muted); border-bottom:1px solid transparent; margin-bottom:-1px; transition:all 0.2s; background:none; border-top:none; border-left:none; border-right:none; }
  .tab.active { color:var(--gold); border-bottom-color:var(--gold); }
  .form-panel { display:none; }
  .form-panel.active { display:block; }
  .input-wrapper { position: relative; margin-bottom: 20px; }
  .at-sign { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 14px; pointer-events: none; }
  input { width: 100%; background: var(--dark3); border: 1px solid var(--border); color: var(--text); font-family: 'Josefin Sans', sans-serif; font-size: 14px; padding: 13px 14px 13px 30px; outline: none; transition: border-color 0.2s; }
  input:focus { border-color: rgba(201,168,76,0.5); }
  input::placeholder { color: rgba(212,207,200,0.2); }
  .btn { width: 100%; padding: 13px; background: var(--gold); color: var(--dark); font-family: 'Josefin Sans', sans-serif; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; border: none; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: var(--gold2); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.2); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
  .divider span { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .admin-link { display: none; }
  .error { color: #E09898; font-size: 11px; margin-top: 12px; display: none; }
  .success { color: #98c9a3; font-size: 11px; margin-top: 12px; display: none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-title" onclick="adminTap()" style="cursor:default;user-select:none;">LewdCrom</div>
    <div class="logo-sub">References Portal</div>
    <div class="logo-line"></div>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('handle')">@ Handle</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- HANDLE -->
    <div class="form-panel active" id="handlePanel">

      <div class="input-wrapper">
        <span class="at-sign">@</span>
        <input type="text" id="handleInput" placeholder="yourhandle" autocomplete="off" autocorrect="off" autocapitalize="none">
      </div>
      <button class="btn" id="enterBtn" onclick="enter()">Enter Portal</button>
      <div class="error" id="handleError"></div>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="registerPanel">
      <div class="card-sub">Create an account to access your commission from any device, anytime.</div>
      <div class="input-wrapper" style="margin-bottom:16px;">
        <input type="email" id="regEmail" placeholder="your@email.com" style="padding:13px 14px;">
      </div>
      <div class="input-wrapper" style="margin-bottom:20px;">
        <input type="password" id="regPass" placeholder="Password (min. 6 chars)" style="padding:13px 14px;">
      </div>
      <button class="btn" id="registerBtn" onclick="register()">Create Account</button>
      <div class="error" id="registerError"></div>
      <div class="success" id="registerSuccess"></div>
    </div>

    <div class="admin-link" onclick="adminLogin()">Artist Access</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://hfwppgawpijskfmvvsvx.supabase.co';
  const SB_KEY = 'sb_publishable_prcjFipRYOiUsVsPjib8dQ_LeSPG5El';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  const saved = localStorage.getItem('lc_handle');
  if (saved === 'admin') window.location.href = 'admin.html';
  else if (saved) window.location.href = 'dashboard.html';

  async function enter() {
    const raw = document.getElementById('handleInput').value.trim().replace(/^@/, '').toLowerCase();
    const err = document.getElementById('handleError');
    const btn = document.getElementById('enterBtn');
    err.style.display = 'none';
    if (!raw) { err.textContent = 'Please enter your Twitter handle.'; err.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Loading...';

    const { data } = await sb.from('commissions').select('id').eq('twitter_handle', raw).maybeSingle();
    if (!data) {
      await sb.from('commissions').insert({ twitter_handle: raw, status: 'pending' });
    }

    localStorage.setItem('lc_handle', raw);
    window.location.href = 'dashboard.html';
  }

  let _taps = 0, _tapTimer = null;
  function adminTap() {
    _taps++;
    clearTimeout(_tapTimer);
    _tapTimer = setTimeout(() => { _taps = 0; }, 1500);
    if (_taps >= 5) { _taps = 0; adminLogin(); }
  }

  function adminLogin() {
    const pw = prompt('Artist password:');
    if (pw === 'lewdcrom1821') {
      localStorage.setItem('lc_handle', 'admin');
      window.location.href = 'admin.html';
    } else if (pw !== null) {
      alert('Wrong password.');
    }
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    if (tab === 'handle') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('handlePanel').classList.add('active');
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('registerPanel').classList.add('active');
    }
  }

  async function register() {
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPass').value;
    const btn   = document.getElementById('registerBtn');
    const err   = document.getElementById('registerError');
    const suc   = document.getElementById('registerSuccess');
    err.style.display = 'none'; suc.style.display = 'none';
    if (!email || !pass) { err.textContent = 'Fill in all fields.'; err.style.display = 'block'; return; }
    if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'Creating...';
    const { data, error } = await sb.auth.signUp({ email, password: pass });
    if (error) { err.textContent = error.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Create Account'; return; }
    // Create commission entry with email as identifier
    const handle = email.split('@')[0].toLowerCase();
    await sb.from('commissions').insert({ twitter_handle: handle, status: 'pending' });
    localStorage.setItem('lc_handle', handle);
    window.location.href = 'dashboard.html';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });
</script>
</body>
</html>
