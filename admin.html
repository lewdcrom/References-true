<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LewdCrom — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Josefin+Sans:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gold:#C9A84C; --gold2:#e8c96a; --dark:#0a0a10; --dark2:#0f0f18; --dark3:#161620; --border:rgba(201,168,76,0.15); --text:#d4cfc8; --muted:rgba(212,207,200,0.45); }
  body { background:var(--dark); color:var(--text); font-family:'Josefin Sans',sans-serif; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; }

  header { border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:rgba(10,10,16,0.95); backdrop-filter:blur(12px); z-index:100; }
  .logo { font-family:'Cinzel',serif; font-size:16px; letter-spacing:0.3em; color:var(--gold); }
  .logo em { font-style:normal; font-size:10px; color:var(--muted); letter-spacing:0.2em; margin-left:10px; }
  .logout-btn { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:1px solid var(--border); padding:6px 12px; background:none; transition:all 0.2s; }
  .logout-btn:hover { color:var(--gold); border-color:var(--gold); }

  .layout { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 57px); position:relative; z-index:1; }
  @media(max-width:680px) { .layout { grid-template-columns:1fr; } .panel { display:none; } .panel.visible { display:block; } }

  .sidebar { border-right:1px solid var(--border); overflow-y:auto; max-height:calc(100vh - 57px); }
  .sidebar-header { padding:16px 20px; border-bottom:1px solid var(--border); font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
  .c-card { padding:14px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
  .c-card:hover { background:rgba(201,168,76,0.04); }
  .c-card.active { background:rgba(201,168,76,0.08); border-left:2px solid var(--gold); }
  .c-handle { font-size:13px; color:var(--text); margin-bottom:4px; }
  .c-handle span { color:var(--gold); }
  .c-meta { font-size:10px; color:var(--muted); display:flex; align-items:center; gap:8px; }
  .c-sdot { width:5px; height:5px; border-radius:50%; display:inline-block; }
  .s-pending .c-sdot { background:var(--gold); }
  .s-in_progress .c-sdot { background:#98c9a3; }
  .s-completed .c-sdot { background:#7eb8f7; }
  .s-cancelled .c-sdot { background:var(--muted); }
  .c-empty { padding:24px 20px; color:var(--muted); font-size:12px; font-style:italic; }

  .panel { overflow-y:auto; max-height:calc(100vh - 57px); padding:24px; }
  .empty-state { color:var(--muted); text-align:center; margin-top:80px; font-style:italic; font-size:13px; }

  .section-label { font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; gap:12px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .card { background:var(--dark2); border:1px solid var(--border); padding:22px; margin-bottom:18px; position:relative; }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:0.4; }

  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .detail-item { background:var(--dark3); border:1px solid var(--border); padding:11px 14px; }
  .detail-item label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:5px; }
  .detail-item p { font-size:13px; line-height:1.5; }

  .status-row { display:flex; align-items:center; gap:12px; margin-top:12px; }
  .status-row label { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
  select { background:var(--dark3); border:1px solid var(--border); color:var(--text); font-family:'Josefin Sans',sans-serif; font-size:11px; padding:8px 12px; outline:none; cursor:pointer; transition:border-color 0.2s; }
  select:focus { border-color:rgba(201,168,76,0.5); }
  select option { background:var(--dark3); }

  .ref-item { display:flex; align-items:center; gap:10px; background:var(--dark3); border:1px solid var(--border); padding:10px 14px; margin-bottom:8px; }
  .ref-type { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); min-width:50px; }
  .ref-content { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .chat-box { height:260px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:4px 0 8px; scroll-behavior:smooth; }
  .chat-box::-webkit-scrollbar { width:3px; }
  .chat-box::-webkit-scrollbar-thumb { background:var(--border); }
  .msg { display:flex; flex-direction:column; max-width:78%; }
  .msg.mine { align-self:flex-end; align-items:flex-end; }
  .msg.theirs { align-self:flex-start; align-items:flex-start; }
  .msg-sender { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:3px; }
  .msg-bubble { padding:9px 13px; font-size:13px; line-height:1.5; border:1px solid var(--border); }
  .msg.mine .msg-bubble { background:rgba(201,168,76,0.08); border-color:rgba(201,168,76,0.2); }
  .msg.theirs .msg-bubble { background:var(--dark3); }
  .msg-time { font-size:9px; color:var(--muted); margin-top:3px; }
  .chat-input-row { display:flex; gap:8px; margin-top:10px; }
  .chat-input { flex:1; background:var(--dark3); border:1px solid var(--border); color:var(--text); font-family:'Josefin Sans',sans-serif; font-size:13px; padding:11px 14px; outline:none; transition:border-color 0.2s; }
  .chat-input:focus { border-color:rgba(201,168,76,0.5); }
  .send-btn { background:var(--gold); color:var(--dark); border:none; font-family:'Josefin Sans',sans-serif; font-size:10px; letter-spacing:0.2em; padding:0 18px; cursor:pointer; transition:background 0.2s; min-height:44px; }
  .send-btn:hover { background:var(--gold2); }
  .empty-note { color:var(--muted); font-size:12px; font-style:italic; text-align:center; padding:16px 0; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
  .c-card { animation:fadeUp 0.3s ease both; }
</style>
</head>
<body>
<header>
  <div class="logo">LewdCrom <em>Admin</em></div>
  <button class="logout-btn" onclick="logout()">Leave</button>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">Commissions</div>
    <div id="commissionList"><div class="c-empty">Loading...</div></div>
  </div>
  <div class="panel" id="mainPanel">
    <div class="empty-state">← Select a commission</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://hfwppgawpijskfmvvsvx.supabase.co';
  const SB_KEY = 'sb_publishable_prcjFipRYOiUsVsPjib8dQ_LeSPG5El';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  if (localStorage.getItem('lc_handle') !== 'admin') window.location.href = 'index.html';

  let all = [], selected = null, msgChannel = null;

  async function init() {
    const { data } = await sb.from('commissions').select('*').order('created_at', { ascending: false });
    all = data || [];
    renderList();
  }

  function renderList() {
    const list = document.getElementById('commissionList');
    if (!all.length) { list.innerHTML = '<div class="c-empty">No commissions yet.</div>'; return; }
    list.innerHTML = all.map(c => `
      <div class="c-card s-${c.status || 'pending'} ${selected?.id === c.id ? 'active' : ''}" onclick="select('${c.id}')">
        <div class="c-handle"><span>@${c.twitter_handle}</span></div>
        <div class="c-meta"><span class="c-sdot"></span>${c.character_name || 'No character yet'} · ${ {pending:'Pending',in_progress:'In Progress',completed:'Completed',cancelled:'Cancelled'}[c.status] || 'Pending'}</div>
      </div>`).join('');
  }

  async function select(id) {
    selected = all.find(c => c.id === id);
    if (!selected) return;
    renderList();

    const [{ data: refs }, { data: msgs }] = await Promise.all([
      sb.from('commission_refs').select('*').eq('commission_id', id).order('created_at'),
      sb.from('messages').select('*').eq('commission_id', id).order('created_at')
    ]);

    renderPanel(selected, refs || [], msgs || []);

    if (msgChannel) sb.removeChannel(msgChannel);
    msgChannel = sb.channel('admin-' + id)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`commission_id=eq.${id}` },
        async () => {
          const { data } = await sb.from('messages').select('*').eq('commission_id', id).order('created_at');
          renderMessages(data || [], selected.twitter_handle);
        }
      ).subscribe();
  }

  function renderPanel(c, refs, msgs) {
    const opts = ['pending','in_progress','completed','cancelled'].map(s =>
      `<option value="${s}" ${c.status===s?'selected':''}>${{pending:'Pending',in_progress:'In Progress',completed:'Completed',cancelled:'Cancelled'}[s]}</option>`
    ).join('');

    document.getElementById('mainPanel').innerHTML = `
      <div class="section-label">@${c.twitter_handle}</div>
      <div class="card">
        <div class="detail-grid">
          <div class="detail-item"><label>Character</label><p>${c.character_name || '—'}</p></div>
          <div class="detail-item"><label>Detail Level</label><p>${c.detail_level || '—'}</p></div>
          <div class="detail-item" style="grid-column:1/-1"><label>Description</label><p>${c.description || '—'}</p></div>
          <div class="detail-item" style="grid-column:1/-1"><label>Notes</label><p>${c.notes || '—'}</p></div>
        </div>
        <div class="status-row">
          <label>Status</label>
          <select onchange="updateStatus('${c.id}', this.value)">${opts}</select>
        </div>
      </div>

      <div class="section-label">References</div>
      <div class="card" style="padding:16px;">
        ${refs.length ? refs.map(r => `
          <div class="ref-item">
            <span class="ref-type">${r.type}</span>
            <span class="ref-content">${r.type!=='note'?`<a href="${r.content}" target="_blank" style="color:var(--gold);text-decoration:none;">${r.content}</a>`:r.content}</span>
          </div>`).join('') : '<div class="empty-note">No references.</div>'}
      </div>

      <div class="section-label">Messages</div>
      <div class="card" style="padding:18px;">
        <div class="chat-box" id="chatBox"></div>
        <div class="chat-input-row">
          <input type="text" class="chat-input" id="adminMsgInput" placeholder="Reply..." onkeydown="if(event.key==='Enter')adminSend()">
          <button class="send-btn" onclick="adminSend()">Send</button>
        </div>
      </div>
    `;
    renderMessages(msgs, c.twitter_handle);
  }

  function renderMessages(msgs, handle) {
    const box = document.getElementById('chatBox');
    if (!box) return;
    if (!msgs.length) { box.innerHTML = '<div class="empty-note">No messages yet.</div>'; return; }
    box.innerHTML = msgs.map(m => {
      const mine = m.sender === 'admin';
      const time = new Date(m.created_at).toLocaleString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="msg ${mine?'mine':'theirs'}">
        <div class="msg-sender">${mine ? 'You' : '@'+(handle||'client')}</div>
        <div class="msg-bubble">${m.content}</div>
        <div class="msg-time">${time}</div>
      </div>`;
    }).join('');
    box.scrollTop = box.scrollHeight;
  }

  async function updateStatus(id, status) {
    await sb.from('commissions').update({ status }).eq('id', id);
    selected.status = status;
    all = all.map(c => c.id === id ? { ...c, status } : c);
    renderList();
  }

  async function adminSend() {
    if (!selected) return;
    const input = document.getElementById('adminMsgInput');
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    await sb.from('messages').insert({ commission_id: selected.id, sender: 'admin', content });
  }

  function logout() { localStorage.removeItem('lc_handle'); window.location.href = 'index.html'; }

  init();
</script>
</body>
</html>
